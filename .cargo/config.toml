[alias]
dev = "build"
run-dev = "run -p faze-cli"
test-all = "test --workspace"
test-fast = "test --workspace --lib"
build-release = "build --release"
build-all = "build --workspace --all-targets"
run-release = "run --release -p faze-cli"
check-all = "check --workspace --all-targets"
fmt-all = "fmt --all"
clippy-all = "clippy --workspace --all-targets -- -D warnings"

[build]
incremental = true
jobs = -1

# Linker settings are local build speed-ups only; CI neutralizes rustflags
# via RUSTFLAGS="". Never add codegen flags here that affect shipped binaries
# (e.g. target-cpu=native) - profiles live in the root Cargo.toml.
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-unknown-linux-musl]
linker = "clang"
rustflags = [
  "-C", "link-arg=-fuse-ld=mold",
  "-C", "target-feature=+crt-static",
]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=/usr/bin/ld"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=/usr/bin/ld"]
